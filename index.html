<style>
:root{--bg:#08090d;--card:#0f1118;--elev:#161822;--brd:#1e2235;--t1:#e8eaf0;--t2:#8b90a8;--t3:#555a72;--a1:#6c5ce7;--a2:#00cec9;--a3:#fd79a8;--gm:linear-gradient(135deg,#6c5ce7,#00cec9);--r:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.amb .o{position:absolute;border-radius:50%;filter:blur(140px);opacity:.08;animation:of 25s ease-in-out infinite}
.amb .o:nth-child(1){width:700px;height:700px;background:#6c5ce7;top:-300px;left:-200px}
.amb .o:nth-child(2){width:600px;height:600px;background:#00cec9;bottom:-200px;right:-150px;animation-delay:-12s}
.amb .o:nth-child(3){width:500px;height:500px;background:#fd79a8;top:40%;left:60%;animation-delay:-6s}
@keyframes of{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-50px) scale(1.1)}66%{transform:translate(-30px,40px) scale(.9)}}
.wrap{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:60px 24px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.brand{text-align:center;margin-bottom:60px;animation:fd .8s ease}
.brand-tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--a2);margin-bottom:20px;padding:6px 16px;border:1px solid rgba(0,206,201,.2);border-radius:100px;background:rgba(0,206,201,.05)}
.brand-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--a2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.brand h1{font-family:'Syne',sans-serif;font-size:clamp(32px,7vw,56px);font-weight:800;line-height:1.3;letter-spacing:-2px;margin-bottom:20px;text-transform:uppercase}
.brand-logo{width:64px;height:64px;border-radius:16px;margin-bottom:16px}
.brand h1 .g1{background:var(--gm);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand h1 .g2{background:linear-gradient(135deg,#fd79a8,#f8b739);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand p{font-size:18px;color:var(--t2);max-width:500px;margin:0 auto;line-height:1.7}
.churches{margin-top:60px;width:100%;animation:fu .8s ease .3s both}
.churches h2{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t3);text-align:center;margin-bottom:20px}
.church-card{display:flex;align-items:center;gap:20px;padding:24px 28px;background:var(--card);border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:all .3s;text-decoration:none;color:var(--t1);position:relative;overflow:hidden}
.church-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gm);opacity:0;transition:opacity .3s}
.church-card:hover{border-color:var(--a1);transform:translateY(-3px);box-shadow:0 8px 40px rgba(108,92,231,.15)}
.church-card:hover::before{opacity:1}
.church-card{animation:cardpulse 3s ease-in-out infinite}
@keyframes cardpulse{0%,100%{box-shadow:0 4px 20px rgba(108,92,231,.05)}50%{box-shadow:0 4px 30px rgba(108,92,231,.2),0 0 50px rgba(0,206,201,.1)}}
.ch-logo{width:56px;height:56px;border-radius:50%;border:2px solid var(--brd);overflow:hidden;flex-shrink:0;background:var(--elev);display:flex;align-items:center;justify-content:center}
.ch-logo img{width:100%;height:100%;object-fit:cover;filter:invert(1)}
.ch-info{flex:1}
.ch-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1.3;text-transform:uppercase}
.ch-desc{font-size:13px;color:var(--t2);margin-top:4px}
.ch-arr{font-size:24px;color:var(--t3);transition:all .3s}
.church-card:hover .ch-arr{color:var(--a1);transform:translateX(4px)}
.footer{margin-top:80px;text-align:center;font-size:11px;color:var(--t3);letter-spacing:.5px;animation:fu .8s ease .5s both}
@keyframes fd{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style></head><body>
